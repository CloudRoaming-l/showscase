<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生创意作品展 | 少儿编程</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff006e;
            --accent-yellow: #ffbe0b;
            --accent-green: #06ffa5;
            --accent-blue: #0096ff;
            --accent-orange: #ff6400;
            --accent-purple: #b464ff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }

        .nav-logo {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .filter-btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 13px;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.08);
        }

        /* ===== 头部区域 ===== */
        .header {
            padding: 120px 40px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            pointer-events: none;
        }

        .header-title {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
        }

        .header-title span {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 60px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Space Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-cyan);
            display: block;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ===== 照片画廊 ===== */
        .gallery-section {
            padding: 0 40px 80px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            padding-left: 16px;
            border-left: 3px solid var(--accent-cyan);
            letter-spacing: 2px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.4s ease;
            cursor: pointer;
            aspect-ratio: 4/3;
            opacity: 0;
            transform: translateY(30px);
        }

        .gallery-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 240, 255, 0.1);
        }

        .gallery-item.wide {
            grid-column: span 2;
            aspect-ratio: 16/9;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .gallery-img.loaded {
            opacity: 1;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.08);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-category {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            width: fit-content;
        }

        .gallery-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .gallery-author {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 分类颜色 */
        .cat-lego { background: rgba(255, 190, 11, 0.2); color: var(--accent-yellow); }
        .cat-robot { background: rgba(0, 240, 255, 0.2); color: var(--accent-cyan); }
        .cat-scratch { background: rgba(255, 0, 110, 0.2); color: var(--accent-magenta); }
        .cat-python { background: rgba(6, 255, 165, 0.2); color: var(--accent-green); }
        .cat-arduino { background: rgba(0, 150, 255, 0.2); color: var(--accent-blue); }
        .cat-award { background: rgba(255, 100, 0, 0.2); color: var(--accent-orange); }

        /* ===== 加载更多 ===== */
        .load-more {
            text-align: center;
            padding: 60px 0;
        }

        .load-more-btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            padding: 14px 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .load-more-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.08);
        }

        .load-more-btn.hidden {
            display: none;
        }

        /* ===== 照片预览弹窗 ===== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 85vh;
            position: relative;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .lightbox-info {
            position: absolute;
            bottom: -80px;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--text-secondary);
        }

        .lightbox-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: -60px;
            right: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .lightbox-close:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .lightbox-nav:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        .lightbox-prev { left: -80px; }
        .lightbox-next { right: -80px; }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .gallery-item.wide {
                grid-column: span 1;
                aspect-ratio: 4/3;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
                height: auto;
                min-height: 60px;
                flex-wrap: wrap;
                padding-top: 10px;
                padding-bottom: 10px;
            }

            .nav-filters {
                gap: 4px;
                justify-content: center;
                width: 100%;
                margin-top: 8px;
            }

            .filter-btn {
                padding: 6px 14px;
                font-size: 12px;
            }

            .header {
                padding: 140px 20px 40px;
            }

            .header-title {
                font-size: 32px;
            }

            .stats-bar {
                gap: 20px;
            }

            .stat-number {
                font-size: 28px;
            }

            .gallery-section {
                padding: 0 20px 60px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 16px;
            }

            .lightbox-prev { left: 20px; }
            .lightbox-next { right: 20px; }
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-logo">少儿编程作品展</div>
        <div class="nav-filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="lego">乐高</button>
            <button class="filter-btn" data-filter="robot">机器人</button>
            <button class="filter-btn" data-filter="scratch">Scratch</button>
            <button class="filter-btn" data-filter="python">Python</button>
            <button class="filter-btn" data-filter="arduino">Arduino</button>
            <button class="filter-btn" data-filter="award">获奖</button>
        </div>
    </nav>

    <!-- 头部 -->
    <header class="header">
        <canvas class="header-bg" id="headerCanvas"></canvas>
        <h1 class="header-title"><span>学生创意</span>作品展</h1>
        <p class="header-subtitle">记录每一个孩子的编程成长之路</p>
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="statTotal">0</span>
                <div class="stat-label">学生作品</div>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statAward">0</span>
                <div class="stat-label">竞赛获奖</div>
            </div>
            <div class="stat-item">
                <span class="stat-number">8</span>
                <div class="stat-label">课程方向</div>
            </div>
            <div class="stat-item">
                <span class="stat-number">5</span>
                <div class="stat-label">教学年份</div>
            </div>
        </div>
    </header>

    <!-- 作品画廊 -->
    <main class="gallery-section">
        <h2 class="section-title">作品展示</h2>
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="load-more">
            <button class="load-more-btn" id="loadMoreBtn">加载更多</button>
        </div>
    </main>

    <!-- 照片预览弹窗 -->
    <div class="lightbox" id="lightbox" role="dialog" aria-label="照片预览" aria-modal="true">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
            <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
            <img src="" alt="" class="lightbox-img" id="lightboxImg">
            <div class="lightbox-info">
                <h3 class="lightbox-title" id="lightboxTitle"></h3>
                <p class="lightbox-desc" id="lightboxDesc"></p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>少儿编程工作室 · 2024-2025 学年 · 记录每一个孩子的成长</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
