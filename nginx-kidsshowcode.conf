# ============================================================
# Nginx 配置 - kidsshowcode.cn
# 部署路径：/www/server/panel/vhost/nginx/kidsshowcode.cn.conf
# ============================================================

# —— HTTP 80 端口：强制跳转 HTTPS ——
server {
    listen 80;
    server_name kidsshowcode.cn www.kidsshowcode.cn;

    # 强制跳转到 HTTPS
    return 301 https://$host$request_uri;
}

# —— HTTPS 443 端口：主站配置 ——
server {
    listen 443 ssl;
    server_name kidsshowcode.cn www.kidsshowcode.cn;

    # —— SSL 证书路径（宝塔面板申请的 Let's Encrypt 证书）——
    # 注意：路径中的 kidsshowcode.cn 需与宝塔面板实际域名一致
    ssl_certificate     /www/server/panel/vhost/cert/kidsshowcode.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/kidsshowcode.cn/privkey.pem;

    # —— SSL 安全配置 ——
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # —— 前端静态资源（Vite 构建产物）——
    root /www/wwwroot/student-showcase/frontend/dist;
    index index.html;

    # —— 前端路由（React SPA，所有路由回退到 index.html）——
    location / {
        try_files $uri $uri/ /index.html;
    }

    # —— 静态资源缓存（带 hash 的文件名，长期缓存）——
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # —— API 反向代理到后端 Node.js ——
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # —— 上传图片代理到后端 ——
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # —— Turbowarp 反向代理到后端（Scratch 作品播放器需要）——
    location /turbowarp/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # —— Gzip 压缩 ——
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;

    # —— 安全头 ——
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
