services:
  mongodb:
    image: mongo:6.0
    container_name: showcase-mongodb
    restart: always
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-showcase123}
    networks:
      - showcase-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: showcase-backend
    restart: always
    volumes:
      - backend-uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-showcase123}@mongodb:27017/student-showcase?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here-must-be-at-least-32-characters}
      ALLOWED_ORIGIN: https://kidsshowcode.cn,https://www.kidsshowcode.cn,http://localhost:3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-管理员}
    depends_on:
      - mongodb
    networks:
      - showcase-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: showcase-frontend
    restart: always
    networks:
      - showcase-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: showcase-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - showcase-network

volumes:
  mongodb-data:
  backend-uploads:

networks:
  showcase-network:
    driver: bridge
